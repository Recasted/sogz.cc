<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="A personal archive." />
  <title>sogz' — archive</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <main class="scene" id="scene">
    <div class="background-image" id="backgroundImage" aria-hidden="true"></div>
    <div class="ink-wash" aria-hidden="true"></div>
    <div class="halftone" aria-hidden="true"></div>
    <div class="scratches" aria-hidden="true"></div>
    <button class="focus-overlay" id="focusOverlay" type="button" aria-label="Close open card"></button>

    <header class="corner-nav">
      <button class="wire-button" id="returnButton" type="button">← return</button>
      <div class="nav-right">
        <button class="wire-button" id="imageButton" type="button">change image</button>
        <button class="wire-button" id="resetButton" type="button">reset</button>
        <button class="wire-button" id="archiveButton" type="button">archives</button>
      </div>
    </header>

    <input id="backgroundPicker" type="file" accept="image/*" hidden />

    <section class="wordmark" aria-label="sogz">
      <span class="sparkle sparkle-a" aria-hidden="true">✦</span>
      <span class="sparkle sparkle-b" aria-hidden="true">✧</span>
      <h1>sogz<span>'</span></h1>
      <span class="sparkle sparkle-c" aria-hidden="true">⋆</span>
      <p>choose a card</p>
    </section>

    <section class="card-field" id="cardField" aria-label="Movable profile cards"></section>

    <aside class="help" id="help">
      <span>drag the cards</span>
      <span>click a card to play</span>
    </aside>

    <footer class="bottom-bar">
      <button class="wire-button" id="soundButton" type="button">music: choose a card</button>
      <p><i></i> interactive archive</p>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <div class="plus-cursor" id="plusCursor" aria-hidden="true"></div>
    <audio id="cardAudio" loop></audio>
  </main>

  <script src="config.js?v=4"></script>
  <script src="script.js?v=4"></script>
</body>
</html>
